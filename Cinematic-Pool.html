<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>iamguer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000; color: #fff;
    font-family: "Inter", system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
  }
  * { box-sizing: border-box; }

  .stage {
    position: fixed; inset: 0;
    overflow: hidden;
  }

  .photo {
    position: absolute; inset: 0;
    background-image: url('assets/portrait-pool.jpg');
    background-size: cover;
    background-position: center 15%;
    transform-origin: center center;
    animation: kenburns 26s ease-in-out infinite alternate;
    will-change: transform;
  }

  @keyframes kenburns {
    0%   { transform: scale(1.08) translate(0, 0); }
    100% { transform: scale(1.22) translate(-2%, -2.5%); }
  }

  .grade {
    position: absolute; inset: 0;
    background:
      radial-gradient(120% 80% at 50% 30%, rgba(0,0,0,0) 35%, rgba(0,0,0,0.55) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.05) 30%, rgba(0,0,0,0.15) 60%, rgba(0,0,0,0.85) 100%);
  }

  .grain {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0.08;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.7'/></svg>");
  }

  .chrome {
    position: absolute; inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 36px 44px;
  }

  .topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.92);
    animation: fadeIn 1.6s ease 0.3s both;
  }
  .mark {
    display: inline-flex; align-items: center; gap: 10px;
    font-weight: 500;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.8);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(0.85); }
  }

  .centerWrap {
    position: absolute; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 2;
  }
  .title {
    font-family: "Instrument Serif", serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(96px, 22vw, 320px);
    line-height: 0.88;
    letter-spacing: -0.045em;
    margin: 0;
    text-align: center;
    color: #fff;
    mix-blend-mode: difference;
    animation: titleIn 2.6s cubic-bezier(.2,.8,.2,1) 0.2s both;
  }
  @keyframes titleIn {
    0% { opacity: 0; letter-spacing: 0.1em; transform: translateY(20px); filter: blur(8px); }
    100% { opacity: 1; letter-spacing: -0.045em; transform: translateY(0); filter: blur(0); }
  }

  .bottomRow {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    animation: fadeIn 1.8s ease 1s both;
  }
  .tag {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    max-width: 280px;
    line-height: 1.7;
    color: rgba(255,255,255,0.9);
  }
  .rightCol {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 18px;
  }
  .ctaRow {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 14px 22px;
    background: rgba(255,255,255,0.95);
    color: #0a0a0a;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.3s ease, background 0.3s ease;
    font-weight: 500;
  }
  .cta:hover { transform: translateY(-2px); background: #fff; }
  .cta.ghost {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(8px);
  }
  .cta.ghost:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.55);
  }

  /* Audio control — pill in the top-right */
  .audioPill {
    position: fixed;
    top: 36px; right: 44px;
    z-index: 10;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px 10px 12px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 999px;
    color: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    cursor: pointer;
    user-select: none;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    transition: background 0.3s ease, border-color 0.3s ease;
    animation: fadeIn 1.6s ease 0.6s both;
  }
  .audioPill:hover { background: rgba(0,0,0,0.55); border-color: rgba(255,255,255,0.35); }

  .eq {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
    width: 16px;
  }
  .eq span {
    flex: 1;
    background: #fff;
    border-radius: 1px;
    height: 30%;
    transform-origin: bottom;
  }
  .eq.playing span:nth-child(1) { animation: bar 0.9s ease-in-out infinite; }
  .eq.playing span:nth-child(2) { animation: bar 1.1s ease-in-out 0.15s infinite; }
  .eq.playing span:nth-child(3) { animation: bar 0.7s ease-in-out 0.3s infinite; }
  .eq.playing span:nth-child(4) { animation: bar 1.3s ease-in-out 0.45s infinite; }
  @keyframes bar {
    0%, 100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }

  /* First-tap overlay so audio can autoplay */
  .enterOverlay {
    position: fixed; inset: 0;
    z-index: 50;
    background: rgba(0,0,0,0.62);
    backdrop-filter: blur(14px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }
  .enterOverlay.hidden { opacity: 0; pointer-events: none; }
  .enterCard {
    text-align: center;
    color: #fff;
    animation: fadeIn 1.2s ease;
  }
  .enterCard .label {
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 18px;
  }
  .enterCard .name {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    font-size: 92px;
    line-height: 1;
    letter-spacing: -0.04em;
    margin: 0 0 24px;
  }
  .enterCard .hint {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 14px 26px;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
  }
  .enterCard .hint .triangle {
    width: 0; height: 0;
    border-left: 8px solid #fff;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Audio source attribution — tiny, bottom right of stage */
  .credit {
    position: fixed;
    bottom: 14px; right: 18px;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    z-index: 4;
  }
  .credit a { color: inherit; text-decoration: none; }
  .credit a:hover { color: rgba(255,255,255,0.8); }

  @media (max-width: 640px) {
    .chrome { padding: 22px 22px; }
    .audioPill { top: 22px; right: 22px; }
    .bottomRow { flex-direction: column; align-items: flex-start; gap: 22px; }
    .rightCol { align-items: flex-start; }
    .enterCard .name { font-size: 64px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="photo"></div>
  <div class="grade"></div>
  <div class="grain"></div>

  <div class="centerWrap">
    <h1 class="title">iamguer</h1>
  </div>

  <div class="chrome">
    <div class="topBar">
      <span class="mark"><span class="dot"></span>iamguer.com</span>
      <span>MMXXVI</span>
    </div>

    <div class="bottomRow">
      <div class="tag">
        Salt, sea, summer light.<br />
        Always somewhere warm.
      </div>

      <div class="rightCol">
        <div class="ctaRow">
          <a href="https://instagram.com/iamguer" target="_blank" rel="noopener" class="cta ghost">
            @iamguer
            <span style="font-size:13px;line-height:0;">↗</span>
          </a>
          <a href="#" class="cta">
            Enter
            <span style="font-size:13px;line-height:0;">→</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Audio controls -->
<button class="audioPill" id="audioToggle" aria-label="Toggle music">
  <span class="eq playing" id="eq"><span></span><span></span><span></span><span></span></span>
  <span id="audioLabel">Sound on</span>
</button>

<!-- Royalty-free chillout track. Hosted on Pixabay's CDN (CC0 / no attribution required). -->
<audio id="bgm" loop preload="auto" crossorigin="anonymous">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_2dde668ca0.mp3?filename=lofi-chill-medium-version-159456.mp3" type="audio/mpeg" />
  <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3" type="audio/mpeg" />
</audio>

<div class="credit">
  Music: <a href="https://pixabay.com/music/search/chill/" target="_blank" rel="noopener">Pixabay (royalty-free)</a>
</div>

<!-- Enter overlay so we can start audio on user gesture -->
<div class="enterOverlay" id="enterOverlay">
  <div class="enterCard">
    <div class="label">iamguer.com</div>
    <div class="name">iamguer</div>
    <div class="hint">
      <span class="triangle"></span>
      Tap to enter · Sound on
    </div>
  </div>
</div>

<script>
  const overlay = document.getElementById('enterOverlay');
  const audio = document.getElementById('bgm');
  const toggle = document.getElementById('audioToggle');
  const label = document.getElementById('audioLabel');
  const eq = document.getElementById('eq');

  audio.volume = 0.45;
  let userMuted = false;

  function setPlaying(playing) {
    if (playing) {
      eq.classList.add('playing');
      label.textContent = 'Sound on';
    } else {
      eq.classList.remove('playing');
      label.textContent = 'Sound off';
    }
  }
  setPlaying(false);

  function fadeIn(el, target = 0.45, ms = 1800) {
    const start = performance.now();
    const from = el.volume;
    function step(now) {
      const t = Math.min(1, (now - start) / ms);
      el.volume = from + (target - from) * t;
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function enter() {
    overlay.classList.add('hidden');
    if (!userMuted) {
      audio.volume = 0;
      audio.play().then(() => {
        setPlaying(true);
        fadeIn(audio, 0.45, 2000);
      }).catch(() => setPlaying(false));
    }
    setTimeout(() => overlay.remove(), 900);
  }

  overlay.addEventListener('click', enter);
  document.addEventListener('keydown', (e) => {
    if (overlay && !overlay.classList.contains('hidden')) enter();
  }, { once: true });

  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    if (audio.paused) {
      userMuted = false;
      audio.play().then(() => setPlaying(true)).catch(() => {});
    } else {
      userMuted = true;
      audio.pause();
      setPlaying(false);
    }
  });
</script>

</body>
</html>
